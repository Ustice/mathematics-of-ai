name: Import Drive PDFs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-drive-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Import PDFs from Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: npm run import-drive-pdfs

      - name: Commit imported PDFs
        run: |
          if git diff --quiet -- artifacts/notability-pdfs/*.pdf; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/notability-pdfs/*.pdf
          git commit -m "Import Notability PDF exports"
          git push
