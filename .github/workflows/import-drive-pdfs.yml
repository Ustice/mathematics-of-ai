name: Import Drive PDFs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-drive-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Import PDFs from Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: npm run import-drive-pdfs

      - name: Commit imported PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Import Notability PDF exports
          file_pattern: artifacts/notability-pdfs/*.pdf
