known_learning_notes:
  - Geometric intuition helps substantially with linear algebra.
  - Matrix multiplication mechanics need careful, low-load presentation.
  - Symbol tables are important because reconstructing notation while learning concepts is costly.
  - Abstraction and invariants help reduce working-memory load.
  - Vocabulary is often harder than the underlying concept.
  - Step schedules need explicit boundary conventions; floor preserves the initial learning rate during the first interval.
  - For directional curvature, v^T H v equals curvature itself when v is normalized; otherwise vector length scales the result.
  - Coordinate coefficients identify steep directions directly only for diagonal Hessians; in general use Hessian eigenvectors.
  - Jacobian shape discipline is secure: rows organize output gradients, columns organize each input coordinate's full output response, and null-space directions have zero first-order effect.
  - Numerical derivative checks are conceptually clear; reinforce consistent row/output and column/input names in implementations.

